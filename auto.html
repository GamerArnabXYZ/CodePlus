
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>Viral Pro Studio</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#020204;
  --accent:#00d2ff;
  --accent-alt:#3a7bd5;
  --card-bg:rgba(15,15,20,0.65);
  --border:rgba(0,210,255,0.3);
  --text:#ffffff;
  --glass:blur(40px) saturate(200%);
  --neon-glow:0 0 20px rgba(0,210,255,0.4),0 0 40px rgba(0,210,255,0.2);
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{
  background:radial-gradient(circle at center,#0a0a1a 0%,#020204 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  -webkit-user-select:none;user-select:none;touch-action:manipulation;
  color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
}

/* ── INTRO GLITCH ── */
.glitch-overlay{
  position:fixed;inset:0;background:#000;z-index:9999;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:20px;transition:opacity 0.8s cubic-bezier(0.8,0,0.2,1);
}
.glitch-overlay.hide{opacity:0;pointer-events:none}
.glitch-text{
  font-family:'JetBrains Mono';font-weight:900;font-size:22px;
  letter-spacing:8px;color:var(--accent);text-transform:uppercase;
  animation:glitch 0.4s infinite;
}
@keyframes glitch{
  0%{transform:translate(0);text-shadow:2px 0 red,-2px 0 blue}
  20%{transform:translate(-2px,2px)}
  40%{transform:translate(-2px,-2px);text-shadow:-2px 0 red,2px 0 blue}
  60%{transform:translate(2px,2px)}
  80%{transform:translate(2px,-2px)}
  100%{transform:translate(0)}
}

/* ── CINEMATIC CARD ── */
.code-card{
  width:90%;max-width:850px;height:64vh;
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:28px;position:relative;overflow:hidden;
  backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);
  box-shadow:0 40px 120px rgba(0,0,0,0.9),var(--neon-glow);
  display:flex;flex-direction:column;
}

.card-header{
  height:52px;padding:0 24px;background:rgba(0,0,0,0.5);
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.card-dots{display:flex;gap:10px;flex-shrink:0}
.cdot{width:12px;height:12px;border-radius:50%}
#fname{
  flex:1;min-width:0;text-align:center;padding:0 10px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-size:10px;font-weight:900;color:var(--accent);
  letter-spacing:2px;text-transform:uppercase;
}

.code-area{
  flex:1;padding:28px;overflow-y:auto;scrollbar-width:none;
  font-family:'JetBrains Mono',monospace;font-size:15px;line-height:1.9;
}
.code-area::-webkit-scrollbar{display:none}

/* ── UI CONTROLS ── */
.ctrl{
  height:44px;padding:0 20px;border-radius:14px;
  background:rgba(0,210,255,0.1);border:1px solid rgba(0,210,255,0.25);
  color:var(--text);font-family:'Inter',sans-serif;font-size:12px;font-weight:700;
  display:inline-flex;align-items:center;gap:8px;cursor:pointer;
  transition:0.2s;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.ctrl:active{transform:scale(0.94)}
.ctrl:hover{background:rgba(0,210,255,0.2)}

/* Ghost recording mode — hide all controls */
body.recording .ui-hide{opacity:0;pointer-events:none;transition:opacity 0.5s}
body.recording .rec-btn{opacity:0;pointer-events:none;transition:opacity 0.5s}

/* Fade-in for .ui-hide when not recording */
.ui-hide{opacity:1;transition:opacity 0.5s}

.rec-btn{
  position:fixed;bottom:36px;right:36px;
  width:68px;height:68px;border-radius:50%;
  background:rgba(255,59,48,0.15);border:2px solid #ff3b30;
  display:flex;align-items:center;justify-content:center;
  color:#ff3b30;cursor:pointer;z-index:1000;transition:0.4s;
  font-size:22px;
}
.rec-btn.active{background:rgba(255,59,48,0.35);box-shadow:0 0 20px rgba(255,59,48,0.4)}

/* ── SYNTAX COLORS ── */
.tag{color:#ff79c6}
.attr{color:#8be9fd}
.val{color:#f1fa8c}
.com{color:#6272a4;font-style:italic}
.key{color:#ff79c6}
.func{color:#50fa7b}
pre#out{white-space:pre-wrap;word-break:break-all;display:inline}

.cur{
  display:inline-block;width:8px;height:1.2em;
  background:var(--accent);vertical-align:middle;
  animation:cur 0.8s infinite;
  box-shadow:0 0 8px var(--accent);margin-left:4px;
}
@keyframes cur{0%,100%{opacity:1}50%{opacity:0}}

/* Preview panel */
.preview-wrap{
  width:100%;background:#fff;border-top:1px solid var(--border);
  transition:height 0.5s cubic-bezier(0.4,0,0.2,1);flex-shrink:0;
}

/* BG Glow */
.bg-glow{
  position:fixed;width:350px;height:350px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,210,255,0.08) 0%,transparent 70%);
  filter:blur(80px);z-index:-1;pointer-events:none;
}

/* Done state */
.code-card.done{border-color:rgba(52,199,89,0.5);box-shadow:0 40px 120px rgba(0,0,0,0.9),0 0 30px rgba(52,199,89,0.3)}

@media(max-width:600px){
  .code-card{width:95%;height:60vh}
  .code-area{padding:20px;font-size:13px}
  .rec-btn{bottom:24px;right:24px;width:60px;height:60px;font-size:20px}
  #fname{font-size:8px;letter-spacing:1px}
}
</style>
</head>
<body>

<div class="glitch-overlay" id="intro">
  <div class="glitch-text">INITIALIZING STUDIO</div>
  <div style="font-size:10px;font-weight:800;color:rgba(0,210,255,0.4);letter-spacing:3px;margin-top:4px">PRO CAPTURE v2.1</div>
</div>

<div class="bg-glow" style="top:-100px;right:-100px"></div>
<div class="bg-glow" style="bottom:-100px;left:-100px"></div>

<div class="code-card" id="card">
  <div class="card-header">
    <div class="card-dots">
      <div class="cdot" style="background:#ff5f57"></div>
      <div class="cdot" style="background:#febc2e"></div>
      <div class="cdot" style="background:#28c840"></div>
    </div>
    <span id="fname">CodeWithArnix & GamerArnabXYZ</span>
    <div style="width:40px"></div>
  </div>
  <div class="code-area" id="cs"><pre id="out"></pre></div>
  <div class="preview-wrap" id="prvWrap" style="height:0">
    <iframe id="prvFrame" style="width:100%;height:100%;border:none"></iframe>
  </div>
</div>

<!-- UI Controls -->
<div class="ui-hide" style="position:fixed;top:24px;left:24px;display:flex;gap:8px;z-index:500">
  <button class="ctrl" onclick="toggle()" id="ctrlBtn">
    <i class="fa-solid fa-pause" id="ctrlIco"></i>
    <span id="ctrlLbl">Stop</span>
  </button>
  <button class="ctrl" style="width:44px;padding:0;justify-content:center" onclick="togglePreview()" title="Toggle Preview">
    <i class="fa-solid fa-display"></i>
  </button>
</div>

<!-- Record button -->
<div class="rec-btn" onclick="toggleRec()" id="recBtn" title="Toggle ghost recording mode">
  <i class="fa-solid fa-camera"></i>
</div>

<script>
const LS='codepad_v1', LSP='codepad_speed', LSL='codepad_layout', LSAF='codepad_auto_fs';
let code='',idx=0,running=false,paused=true,timer=null;
const out=document.getElementById('out');
const cs=document.getElementById('cs');
const card=document.getElementById('card');
const cur=document.createElement('span');
cur.className='cur';

// Optimized: Cache localStorage value
let isSoundEnabled = (localStorage.getItem('cp_sound') === 'true');
let files = JSON.parse(localStorage.getItem('codepad_v1_files') || '{"index.html":""}');

// Speed handling: Optimized logic for 1-50 scale
  const spdSetting = parseInt(localStorage.getItem(LSP) || '5');
  const currentDelay = Math.max(5, 200 - (spdSetting * 3));

/* ── AUDIO ── */
let audioCtx=null, clickBuffer=null;
async function initAudio(){
  if(audioCtx) return;
  try{
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const resp = await fetch('keyboard.wav'); // Ensure file is named correctly
    const arr = await resp.arrayBuffer();
    clickBuffer = await audioCtx.decodeAudioData(arr);
  } catch(e){ console.warn('Audio system inactive:', e); }
}
function playClick(){
  const turboDelays=[100,80,65,52,42,34,26,20,15,11,8,6,4,2.5,1.5,1,0.75,0.5,0.25,0];
  try{
    const src=audioCtx.createBufferSource(); src.buffer=clickBuffer;
    const gain=audioCtx.createGain(); gain.gain.setValueAtTime(0.12,audioCtx.currentTime);
    src.connect(gain); gain.connect(audioCtx.destination); src.start(0);
  } catch(e){}
}

/* ── SYNTAX HIGHLIGHT ── */
function highlight(text){
  const esc=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Process in order: comments → tags → attribute values
  const placeholders=[];
  let r=esc;
  // Comments
  r=r.replace(/(&lt;!--[\s\S]*?--&gt;)/g,(m)=>{
    const ph='__PH'+placeholders.length+'__';
    placeholders.push({ph,html:`<span class="com">${m}</span>`});
    return ph;
  });
  // Tags (whole tag)
  r=r.replace(/(&lt;[!\/]?[a-zA-Z][^&]*?&gt;)/g,(m)=>{
    // Color attr values inside tag
    const inner=m.replace(/(=["])([^"]*?)(")/g,`=$1<span class="val">$2</span>$3`).replace(/(=')(.*?)(')/g,`=$1<span class="val">$2</span>$3`);
    const ph='__PH'+placeholders.length+'__';
    placeholders.push({ph,html:`<span class="tag">${inner}</span>`});
    return ph;
  });
  placeholders.forEach(p=>{ r=r.replace(p.ph,p.html); });
  return r;
}

/* ── INIT ── */
window.addEventListener('DOMContentLoaded',()=>{
  // Merge files for playback
  code = (files['index.html'] || '') + 
         (files['style.css'] ? `\n\n<style>\n${files['style.css']}\n</style>` : '') +
         (files['script.js'] ? `\n\n<script>\n${files['script.js']}\n<\/script>` : '');
         
  const layout=localStorage.getItem(LSL)||'classic';
  document.body.classList.add('lay-'+layout);

  // Extra items hidden by default — triple-tap reveals them
  document.body.classList.add('recording');

  // Font size & Layout setup
  const autoFs=localStorage.getItem(LSAF)||'16';
  updateFS(autoFs);
  document.body.className = 'lay-' + (localStorage.getItem(LSL) || 'classic');

  // Cinematic intro
  setTimeout(()=>{
    document.getElementById('intro').classList.add('hide');
    if(code.trim()){
      setState('paused');
    } else {
      out.textContent='// No content found. \n// Write code in index.html and Launch again.';
    }
  },1800);

  initTapGestures();
});

/* ── TYPING ENGINE ── */
function tick(){
  if(!running || paused) return;
  if(idx >= code.length){
    running = false;
    setState('done');
    card.classList.add('done');
    if(localStorage.getItem('cp_particles') === 'true') confettiBurst();
    return;
  }

  // Optimized Typing Logic
  const chunk = code.slice(0, idx + 1);
  out.innerHTML = highlight(chunk) + '<span class="cur"></span>';
  
  // Auto-scroll logic
  cs.scrollTop = cs.scrollHeight;

  // Live Preview Update
  if(prvWrap.style.height !== '0px' && prvWrap.style.height !== '0') {
    renderPreview(code.slice(0, idx));
  }
  
  idx++;
  timer = setTimeout(tick, currentDelay);
}

/* ── CONTROLS ── */
const ctrlLbl = document.getElementById('ctrlLbl'); // Cached
const ctrlIco = document.getElementById('ctrlIco'); // Cached

function toggle(){
  if(paused){ paused=false; running=true; setState('running'); tick(); }
  else { paused=true; setState('paused'); if(timer) clearTimeout(timer); }
}

function setState(s){
  if(s==='running'){ ctrlLbl.textContent='Stop'; ctrlIco.className='fa-solid fa-pause'; }
  else if(s==='paused'){ ctrlLbl.textContent='Resume'; ctrlIco.className='fa-solid fa-play'; }
  else if(s==='done'){ ctrlLbl.textContent='Done'; ctrlIco.className='fa-solid fa-check'; }
}

function toggleRec(){
  const isRec=document.body.classList.toggle('recording');
  document.getElementById('recBtn').classList.toggle('active',isRec);
  if(isRec) console.log("REC_MODE_ACTIVE: Start Screen Recording");
}

/* ── TAP GESTURES ── */
/* Single tap = pause/resume | Double tap = preview on/off | Triple tap = extra UI items on/off */
let tapCount=0, tapTimer=null;
const TAP_WINDOW=320;

function initTapGestures(){
  document.body.addEventListener('click', handleTap);
}

function handleTap(e){
  // Ignore taps on actual interactive controls — they have their own onclick
  if(e.target.closest('.ctrl, .rec-btn, input, button')) return;

  tapCount++;
  clearTimeout(tapTimer);
  tapTimer=setTimeout(()=>{
    if(tapCount===1) toggle();
    else if(tapCount===2) togglePreview();
    else if(tapCount>=3) toggleRec();
    tapCount=0;
  }, TAP_WINDOW);
}

function updateFS(v){
  cs.style.fontSize=v+'px';
}

function renderPreview(html){
  const prv=document.getElementById('prvWrap');
  if(prv.style.height==='0px'||prv.style.height==='0'||!prv.style.height) return;
  document.getElementById('prvFrame').srcdoc=html;
}

const prvWrap = document.getElementById('prvWrap'); // Cached
const prvFrame = document.getElementById('prvFrame'); // Cached

function togglePreview(){
  const isOpen=prvWrap.style.height!=='0px'&&prvWrap.style.height!==''&&prvWrap.style.height!=='0';
  prvWrap.style.height=isOpen?'0':'28vh';
  if(!isOpen) {
    prvFrame.srcdoc = code.slice(0, idx);
    // Force refresh the frame content for better rendering
    prvFrame.contentWindow.location.reload();
  }
}

/* ── CONFETTI ── */
function confettiBurst(){
  const colors=['#ff79c6','#50fa7b','#f1fa8c','#00d2ff','#ff5f57','#febc2e'];
  for(let i=0;i<40;i++){
    const conf=document.createElement('div');
    const color=colors[Math.floor(Math.random()*colors.length)];
    conf.style.cssText=`position:fixed;left:50%;top:50%;width:7px;height:7px;background:${color};border-radius:50%;z-index:10000;pointer-events:none;box-shadow:0 0 10px ${color}`;
    document.body.appendChild(conf);
    const angle=Math.random()*Math.PI*2;
    const vel=6+Math.random()*12;
    const vx=Math.cos(angle)*vel, vy=Math.sin(angle)*vel;
    let x=0,y=0,op=1;
    const move=()=>{
      x+=vx; y+=vy*1.02; op-=0.018;
      conf.style.transform=`translate(calc(-50% + ${x}px),calc(-50% + ${y}px))`;
      conf.style.opacity=op;
      if(op>0) requestAnimationFrame(move); else conf.remove();
    };
    setTimeout(()=>requestAnimationFrame(move), Math.random()*200);
  }
}
</script>
</body>
</html>
