<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#050505;
  --surface:#0c0c0e;
  --surface2:#121214;
  --surface3:#18181b;
  --border:rgba(0,210,255,0.2);
  --text:#ffffff;
  --text2:#a1a1a6;
  --text3:#6e6e73;
  --accent:#00d2ff;
  --accent-alt:#3a7bd5;
  --neon-glow:0 0 15px rgba(0,210,255,0.5);
  --green:#30d158;
  --orange:#ff9f0a;
  --mono:'JetBrains Mono',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{color:var(--text);font-family:var(--sans);display:flex;flex-direction:column;height:100dvh}

/* Cinematic RGB Border */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none;
  border:3px solid transparent;
  background:linear-gradient(var(--bg), var(--bg)) padding-box,
             linear-gradient(90deg, #ff0000, #00ff00, #0000ff, #ff0000) border-box;
  background-size:200% 100%; animation:move-border 4s linear infinite;
  z-index:9999; opacity:0.2;
}

/* MOVING GRID BACKGROUND */
.grid-bg {
  position: fixed; inset: 0;
  background-image: linear-gradient(var(--border) 1px, transparent 1px),
                    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 50px 50px;
  background-position: center;
  transform: perspective(500px) rotateX(60deg) translateY(0);
  animation: grid-move 10s linear infinite;
  opacity: 0.15; z-index: -1;
}
@keyframes grid-move {
  0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
  100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
}

/* SCREEN SHAKE */
.shake { animation: shake 0.1s linear infinite; }
@keyframes shake {
  0% { transform: translate(0px, 0px); }
  25% { transform: translate(1px, 1px); }
  50% { transform: translate(-1px, 1px); }
  75% { transform: translate(1px, -1px); }
  100% { transform: translate(0px, 0px); }
}

/* ── TITLEBAR ── */
.titlebar{
  flex-shrink:0;height:56px;
  background:rgba(12,12,14,0.9);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:15px;
  backdrop-filter:blur(20px);
}
.wdots{display:flex;gap:10px}
.wd{width:13px;height:13px;border-radius:50%;box-shadow:0 0 5px rgba(0,0,0,0.5)}
.wd.r{background:#ff5f57}.wd.y{background:#febc2e}.wd.g{background:#28c840}
.title-mid{flex:1;display:flex;justify-content:center}
.title-text{font-size:12px;font-weight:800;color:var(--accent);letter-spacing:2px;text-transform:uppercase;text-shadow:var(--neon-glow)}

.ctrl{
  display:flex;align-items:center;gap:8px;
  padding:6px 16px;border-radius:30px;
  border:1px solid var(--border);background:var(--surface2);
  color:var(--accent);font-size:11px;font-weight:700;
  cursor:pointer;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);min-height:32px;
  box-shadow:var(--neon-glow);
}
.ctrl i{font-size:10px}
.ctrl .cdot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;box-shadow:var(--neon-glow)}
.ctrl.running .cdot{animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

/* ── TABS ── */
.tabs{
  flex-shrink:0;display:flex;align-items:stretch;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 12px;
}
.tab{
  display:flex;align-items:center;gap:8px;
  padding:0 16px;height:40px;
  font-size:12px;font-family:var(--mono);
  color:var(--text);position:relative;
}
.tab i{font-size:13px;color:var(--orange)}
.tab::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:2px;background:var(--accent)}

/* ── EDITOR ── */
.editor-wrap{flex:1;display:flex;min-height:0;overflow:hidden;background:var(--bg);position:relative}
.gutter{
  width:55px;flex-shrink:0;
  background:rgba(5,5,5,0.8);border-right:1px solid var(--border);
  padding-top:20px;overflow:hidden;user-select:none;pointer-events:none;
}
.ln{display:block;text-align:right;padding-right:12px;font-size:12px;line-height:24px;color:var(--text3);font-family:var(--mono);opacity:0.5}
.code-scroll{flex:1;overflow-y:auto;overflow-x:auto;padding:30px;background:transparent}
pre#out{
  font-family:var(--mono);font-size:16px;line-height:1.7;
  color:var(--text);white-space:pre;tab-size:4;min-height:100%;
  text-shadow:0 0 8px rgba(255,255,255,0.1);
}
#out .tag { color: #569cd6; }
#out .attr { color: #9cdcfe; }
#out .val { color: #ce9178; }
#out .com { color: #6a9955; font-style: italic; }

.cur{
  display:inline-block;width:8px;height:1.2em;
  background:var(--accent);vertical-align:text-bottom;
  animation:cur 1s step-start infinite;
  box-shadow:0 0 15px var(--accent);
  border-radius:2px;margin-left:2px;
}
@keyframes cur{0%,100%{opacity:1}50%{opacity:0}}

/* ── PREVIEW ── */
.preview-wrap{
  flex-shrink:0;overflow:hidden;
  border:2px solid var(--border);background:#fff;
  transition:height 0.4s cubic-bezier(0.4,0,0.2,1);
  box-shadow:0 -15px 40px rgba(0,0,0,0.6);
  margin:0 10px; border-radius:20px 20px 0 0;
}
.preview-wrap.open{height:40vh}
.preview-wrap.shut{height:0}
.preview-bar{
  height:36px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 12px;gap:10px;
}
.pb-label{font-size:11px;font-weight:600;color:var(--text3);font-family:var(--sans);flex:1;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:0.5px}
.pb-label i{color:var(--accent)}
#prvFrame{width:100%;height:calc(100% - 36px);border:none}

/* ── STATUSBAR ── */
.statusbar{
  flex-shrink:0;height:32px;
  background:linear-gradient(to right, var(--accent), var(--accent-alt));
  display:flex;align-items:center;padding:0 12px;gap:16px;
  font-size:11px;font-weight:700;color:#000;
}
.sb{display:flex;align-items:center;gap:6px}
.sb i{font-size:10px;color:#000}
.sb-sp{flex:1}

/* ── MOBILE OPTIMIZATIONS ── */
@media (max-width:600px){
  .title-text{display:none}
  .gutter{width:40px}
  .ln{padding-right:8px;font-size:11px}
  pre#out{font-size:14px}
  .preview-wrap.open{height:45vh}
}

/* ── EMPTY ── */
.empty{
  display:none;flex-direction:column;align-items:center;
  justify-content:center;height:100%;gap:12px;
  color:var(--text3);text-align:center;padding:40px 24px;
}
.empty.show{display:flex}
.empty i.big{font-size:32px;opacity:.2}
.empty-h{font-size:15px;font-weight:600;color:var(--text2);opacity:.4}
.empty-p{font-size:12px;line-height:1.6;opacity:.5}
.back-a{
  margin-top:6px;display:inline-flex;align-items:center;gap:7px;
  padding:10px 16px;border-radius:10px;
  border:1px solid var(--border);background:var(--surface2);
  color:var(--text2);font-family:var(--sans);font-size:12px;font-weight:500;
  text-decoration:none;transition:all .15s;
}
.back-a:active{transform:scale(.95)}
</style>
<title>CodeWithArnix & GamerArnabXYZ</title>
</head>
<body>
<div class="grid-bg"></div>

<div class="titlebar">
  <div class="wdots"><div class="wd r"></div><div class="wd y"></div><div class="wd g"></div></div>
  <div class="title-mid"><span class="title-text">CodeWithArnix & GamerArnabXYZ</span></div>
  <button class="ctrl" id="ctrl" onclick="toggle()">
    <div class="cdot"></div>
    <i class="fa-solid fa-pause" id="ctrlIco"></i>
    <span id="ctrlLbl">idle</span>
  </button>
</div>

<div class="tabs">
  <div class="tab"><i class="fa-brands fa-html5"></i><span id="fname">index.html</span></div>
</div>

<div class="editor-wrap">
  <div class="gutter" id="gutter"></div>
  <div class="code-scroll" id="cs">
    <div class="empty show" id="empty">
      <i class="fa-solid fa-code big"></i>
      <div class="empty-h">No code found</div>
      <div class="empty-p">index.html pe code likho aur save karo</div>
      <a class="back-a" href="index.html"><i class="fa-solid fa-arrow-left"></i>Back to editor</a>
    </div>
    <pre id="out" style="display:none"></pre>
  </div>
</div>

<div class="preview-wrap open" id="prvWrap">
  <div class="preview-bar">
    <div class="pb-dots"><div class="pbd r"></div><div class="pbd y"></div><div class="pbd g"></div></div>
    <div class="pb-label"><i class="fa-solid fa-globe"></i>Preview</div>
  </div>
  <iframe id="prvFrame" sandbox="allow-scripts allow-same-origin"></iframe>
</div>

<div class="statusbar">
  <div class="sb"><i class="fa-solid fa-circle-dot"></i><span id="sbSt">Idle</span></div>
  <div class="sb"><i class="fa-solid fa-list-ol"></i><span id="sbLn">Ln 1</span></div>
  <div class="sb-sp"></div>
  <div class="sb"><i class="fa-solid fa-keyboard"></i><span id="sbIdx">0</span>/<span id="sbTot">0</span></div>
  <div class="sb"><span id="sbPct">0%</span></div>
</div>

<script>
const LS='codepad_v1', LSP='codepad_speed';
let code='',idx=0,running=false,paused=false,timer=null;
const out=document.getElementById('out');
const gut=document.getElementById('gutter');
const cs=document.getElementById('cs');
const cur=document.createElement('span'); cur.className='cur';
const delays=[120,80,50,30,20,12,8,4,2,1];

// Audio Context and Buffer for real sound
let audioCtx = null;
let clickBuffer = null;

async function initAudio() {
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') await audioCtx.resume();
  
  if(!clickBuffer && getOpt('sound')) {
    try {
      const resp = await fetch('keyboard affect.wav');
      const arrayBuf = await resp.arrayBuffer();
      clickBuffer = await audioCtx.decodeAudioData(arrayBuf);
    } catch(e) { console.error("Audio load error:", e); }
  }
}

function playClick() {
  if(!getOpt('sound') || !clickBuffer) return;
  if(!audioCtx) return;
  const source = audioCtx.createBufferSource();
  source.buffer = clickBuffer;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  source.connect(gain);
  gain.connect(audioCtx.destination);
  source.start(0);
}

// Simple Syntax Highlighter for auto-type
function highlight(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/(&lt;[!\/]?[a-zA-Z0-9]+(?:\s+[a-zA-Z0-9-]+(?:=".*?")?)*[!\/]?&gt;)/g, '<span class="tag">$1</span>')
    .replace(/(".*?")/g, '<span class="val">$1</span>')
    .replace(/(&lt;!--.*?--&gt;)/g, '<span class="com">$1</span>');
}

// Creator Settings
const getOpt = (o) => localStorage.getItem('cp_'+o) === 'true';

function delay(){
  let d = delays[Math.min(Math.max(parseInt(localStorage.getItem(LSP)||'5'),1),10)-1];
  if(getOpt('turbo')) d = Math.max(1, d / 2); 
  return d;
}

window.addEventListener('DOMContentLoaded',()=>{
  code=localStorage.getItem(LS)||'';
  document.getElementById('sbTot').textContent=code.length;
  if(code){
    document.getElementById('empty').classList.remove('show');
    out.style.display='block';
    out.innerHTML = '';
    out.appendChild(cur);
    buildGut(1);
    // User interaction required for audio
    document.body.addEventListener('click', () => {
      initAudio();
    }, {once:true});
    setTimeout(startTyping,500);
  }
});

function startTyping(){
  if(running||!code)return;
  running=true;paused=false;setState('running');
  tick();
}

function tick(){
  if(!running || paused) return;
  
  if(idx>=code.length){
    running=false;paused=false;
    setState('done');updateSb();
    renderPreview(code);
    document.body.classList.remove('shake');
    confettiBurst();
    return;
  }
  
  const ch=code[idx];
  idx++;
  
  // Update output with highlight
  const partial = code.slice(0, idx);
  out.innerHTML = highlight(partial);
  out.appendChild(cur);
  
  playClick();

  // Screen Shake effect
  if(getOpt('shake') && ch !== ' ' && ch !== '\n') {
    document.body.classList.add('shake');
    setTimeout(() => document.body.classList.remove('shake'), 40);
  }
  
  cur.scrollIntoView({block:'nearest',behavior:'auto'});
  if(ch==='\n'){
    const l=(partial.match(/\n/g)||[]).length+1;
    buildGut(l);
  }
  
  // Optimized Preview Render: only on tags or every 100 chars
  if(ch==='>' || idx%100===0) renderPreview(partial);
  
  updateSb();
  timer = setTimeout(tick, delay());
}

function confettiBurst(){
  for(let i=0; i<30; i++){
    const conf = document.createElement('div');
    conf.style.cssText = `
      position:fixed; left:50%; top:50%;
      width:8px; height:8px; background:hsl(${Math.random()*360}, 100%, 50%);
      border-radius:50%; z-index:10000;
      pointer-events:none;
      box-shadow: 0 0 10px currentColor;
    `;
    document.body.appendChild(conf);
    const angle = Math.random() * Math.PI * 2;
    const velocity = 5 + Math.random() * 10;
    const vx = Math.cos(angle) * velocity;
    const vy = Math.sin(angle) * velocity;
    let x = 0, y = 0, opacity = 1;
    const move = () => {
      x += vx; y += vy; opacity -= 0.02;
      conf.style.transform = `translate(${x}px, ${y}px)`;
      conf.style.opacity = opacity;
      if(opacity > 0) requestAnimationFrame(move);
      else conf.remove();
    };
    move();
  }
}

function toggle(){
  initAudio();
  if(!running&&!paused){startTyping();return;}
  if(!paused){
    paused=true;clearTimeout(timer);timer=null;setState('paused');
  } else {
    paused=false;running=true;setState('running');tick();
  }
}

function setState(s){
  const el=document.getElementById('ctrl');
  const ico=document.getElementById('ctrlIco');
  const lbl=document.getElementById('ctrlLbl');
  el.className='ctrl '+s;
  if(s==='running'){ico.className='fa-solid fa-pause';lbl.textContent='Stop';document.getElementById('sbSt').textContent='Typing';}
  else if(s==='paused'){ico.className='fa-solid fa-play';lbl.textContent='Resume';document.getElementById('sbSt').textContent='Paused';}
  else if(s==='done'){ico.className='fa-solid fa-check';lbl.textContent='Done';document.getElementById('sbSt').textContent='Done';}
  else{ico.className='fa-solid fa-pause';lbl.textContent='idle';document.getElementById('sbSt').textContent='Idle';}
}

function updateSb(){
  const pct=code?Math.round((idx/code.length)*100):0;
  document.getElementById('sbIdx').textContent=idx;
  document.getElementById('sbPct').textContent=pct+'%';
  const l=(code.slice(0,idx).match(/\n/g)||[]).length+1;
  document.getElementById('sbLn').textContent='Ln '+l;
}

let lastLnCount = 0;
function buildGut(n){
  if(n === lastLnCount) return;
  lastLnCount = n;
  let html = '';
  for(let i=1; i<=n; i++){
    html += `<span class="ln">${i}</span>`;
  }
  gut.innerHTML = html;
  gut.scrollTop=cs.scrollTop;
}

function renderPreview(html){
  document.getElementById('prvFrame').srcdoc = html || '';
}

cs.addEventListener('scroll',()=>{gut.scrollTop=cs.scrollTop;});
</script>
</body>
</html>
