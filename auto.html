<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#020204;
  --accent:#00d2ff;
  --accent-alt:#3a7bd5;
  --card-bg:rgba(15,15,20,0.6);
  --border:rgba(0,210,255,0.3);
  --text:#ffffff;
  --glass:blur(40px) saturate(200%);
  --neon-glow:0 0 20px rgba(0,210,255,0.4), 0 0 40px rgba(0,210,255,0.2);
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{
  background:radial-gradient(circle at center, #0a0a1a 0%, #020204 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Inter",sans-serif;
}

.grid-bg {
  position: fixed; inset: 0;
  background-image: linear-gradient(rgba(0,210,255,0.05) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0,210,255,0.05) 1px, transparent 1px);
  background-size: 50px 50px; z-index: -1; opacity: 0.2;
}

/* ── CINEMATIC CARD ── */
.code-card{
  width:88%; max-width:800px; height:65vh; /* Reduced height for top/bottom space */
  background:var(--card-bg); border:1px solid var(--border);
  border-radius:28px; position:relative; overflow:hidden;
  backdrop-filter:var(--glass); -webkit-backdrop-filter:var(--glass);
  box-shadow:0 30px 100px rgba(0,0,0,0.8), var(--neon-glow);
  display:flex; flex-direction:column;
  transition:0.5s cubic-bezier(0.4,0,0.2,1);
  animation:card-float 6s ease-in-out infinite;
  margin:60px 0; /* Vertical Safe Zone */
}
@keyframes card-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

.card-header{
  height:50px; padding:0 24px; background:rgba(0,0,0,0.4);
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.card-dots{display:flex; gap:10px;}
.cdot{width:10px; height:10px; border-radius:50%;}

.code-area{
  flex:1; padding:28px; overflow-y:auto; scrollbar-width:none;
  font-family:'JetBrains Mono', monospace; font-size:15px; line-height:1.7;
}
.code-area::-webkit-scrollbar{display:none;}

/* ── UI ELEMENTS ── */
.ctrl{
  padding:0 18px; height:36px; border-radius:18px;
  background:rgba(255,255,255,0.05); border:1px solid var(--border);
  color:var(--accent); font-size:10px; font-weight:800; cursor:pointer;
  display:flex; align-items:center; gap:8px; transition:0.3s;
  backdrop-filter:blur(10px);
}

/* ── GHOST RECORDING MODE ── */
body.recording .ui-hide, body.recording .rec-btn { opacity:0; pointer-events:none; visibility:hidden; }

.rec-btn{
  position:fixed; bottom:40px; right:30px;
  width:64px; height:64px; border-radius:50%;
  background:rgba(255,59,48,0.15); border:2px solid #ff3b30;
  display:flex; align-items:center; justify-content:center;
  color:#ff3b30; cursor:pointer; z-index:1000; transition:0.4s;
}

/* ── SYNTAX COLORS ── */
.tag{color:#ff79c6; text-shadow:0 0 10px rgba(255,121,198,0.4)}
.attr{color:#50fa7b}
.val{color:#f1fa8c}
.com{color:#6272a4; font-style:italic}

pre#out{ white-space:pre-wrap; word-break:break-all; }

.cur{
  display:inline-block; width:8px; height:1.2em;
  background:var(--accent); vertical-align:text-bottom;
  animation:cur 1s step-start infinite;
  box-shadow:var(--neon-glow); border-radius:2px; margin-left:2px;
}
@keyframes cur{0%,100%{opacity:1}50%{opacity:0}}

.preview-wrap{width:100%; overflow:hidden; background:#fff; border-top:1px solid var(--border); transition:0.5s;}

/* Layouts */
body.lay-wide .code-card { height:75vh; max-width:950px; }
body.lay-wide .code-area { flex:0.4; }
body.lay-wide #prvWrap { flex:1; height:auto !important; }
body.lay-focus .preview-wrap { display:none; height:100% !important; border:none; }
body.lay-focus.show-prv .code-area { display:none; }
body.lay-focus.show-prv .preview-wrap { display:block; }

.statusbar{position:fixed; bottom:0; left:0; right:0; height:26px; background:rgba(0,0,0,0.3); display:flex; align-items:center; padding:0 20px; font-size:9px; font-weight:800; color:#333;}
.shake { animation: shake 0.1s linear infinite; }
@keyframes shake { 0%{transform:translate(0,0)} 25%{transform:translate(1px,1px)} 50%{transform:translate(-1px,1px)} 75%{transform:translate(1px,-1px)} 100%{transform:translate(0,0)} }

@media (max-width:600px){ .code-card{width:94%; height:60vh;} .code-area{padding:20px;} }
</style>
<title>Pro Capture Studio</title>
</head>
<body>
<div class="grid-bg"></div>

<div class="code-card">
  <div class="card-header">
    <div class="card-dots">
      <div class="cdot" style="background:#ff5f57"></div>
      <div class="cdot" style="background:#febc2e"></div>
      <div class="cdot" style="background:#28c840"></div>
    </div>
    <span style="font-size:9px;font-weight:900;color:var(--accent);letter-spacing:3px;text-transform:uppercase" id="fname">CodeWithArnix & GamerArnabXYZ</span>
    <div style="width:40px"></div>
  </div>
  <div class="code-area" id="cs"><pre id="out"></pre></div>
  <div class="preview-wrap" id="prvWrap" style="height:0"><iframe id="prvFrame" style="width:100%;height:100%;border:none"></iframe></div>
</div>

<!-- FLOATING STUDIO UI -->
<div class="ui-hide" style="position:fixed;top:20px;left:20px;display:flex;flex-direction:column;gap:10px;z-index:500">
  <div style="display:flex;gap:8px">
    <button class="ctrl" onclick="toggle()"><i class="fa-solid fa-pause" id="ctrlIco"></i><span id="ctrlLbl">Stop</span></button>
    <button class="ctrl" id="prvToggle" onclick="togglePreview()"><i class="fa-solid fa-display"></i></button>
  </div>
  <!-- On-the-fly Font Size -->
  <div class="ctrl" style="height:32px; gap:12px; width:fit-content">
    <i class="fa-solid fa-font" style="font-size:10px"></i>
    <input type="range" min="10" max="24" value="15" oninput="updateFS(this.value)" style="width:80px; accent-color:var(--accent)">
    <span id="fsNum" style="min-width:25px">15px</span>
  </div>
</div>

<button class="ctrl ui-hide" id="switchBtn" style="position:fixed;bottom:30px;left:50%;transform:translateX(-50%);display:none" onclick="focusSwitch()">
  <i class="fa-solid fa-rotate"></i> <span id="swTxt">Show Preview</span>
</button>

<div class="rec-btn" onclick="toggleRec()" id="recBtn"><i class="fa-solid fa-video"></i></div>

<div class="statusbar ui-hide">
  <span id="sbSt">READY</span><div style="flex:1"></div><span id="sbPct">0%</span>
</div>

<script>
const LS='codepad_v1', LSP='codepad_speed', LSL='codepad_layout';
let code='',idx=0,running=false,paused=false,timer=null;
const out=document.getElementById('out'), cs=document.getElementById('cs');
const cur=document.createElement('span'); cur.className='cur';
// Extended Speeds: 1 to 20
const delays=[150,120,100,80,65,55,45,35,28,22,18,14,10,7,5,3,2,1,0.5,0];

let audioCtx = null, clickBuffer = null;
async function initAudio() {
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') await audioCtx.resume();
  if(!clickBuffer && localStorage.getItem('cp_sound') === 'true') {
    try {
      const resp = await fetch('keyboard affect.wav');
      clickBuffer = await audioCtx.decodeAudioData(await resp.arrayBuffer());
    } catch(e) { console.error(e); }
  }
}
function playClick() {
  if(localStorage.getItem('cp_sound') !== 'true' || !clickBuffer || !audioCtx) return;
  const source = audioCtx.createBufferSource(); source.buffer = clickBuffer;
  const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
  source.connect(gain); gain.connect(audioCtx.destination); source.start(0);
}

function highlight(text) {
  const escaped = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const rules = [
    { reg: /(&lt;!--.*?--&gt;)/g, cls: 'com' },
    { reg: /(&lt;[!\/]?[a-zA-Z0-9]+(?:\s+[a-zA-Z0-9-]+(?:=".*?")?)*[!\/]?&gt;)/g, cls: 'tag' },
    { reg: /(".*?")/g, cls: 'val' }
  ];
  let result = escaped; const placeholders = [];
  rules.forEach((rule, i) => {
    result = result.replace(rule.reg, (m) => {
      const ph = `__PH_${i}_${placeholders.length}__`;
      placeholders.push({ ph, html: `<span class="${rule.cls}">${m}</span>` });
      return ph;
    });
  });
  placeholders.forEach(p => result = result.replace(p.ph, p.html));
  return result;
}

window.addEventListener('DOMContentLoaded',()=>{
  code=localStorage.getItem(LS)||'';
  const layout = localStorage.getItem(LSL) || 'classic';
  document.body.classList.add('lay-' + layout);
  if(layout === 'focus') { document.getElementById('switchBtn').style.display = 'flex'; document.getElementById('prvToggle').style.display='none'; }

  if(code){
    out.innerHTML = ''; out.appendChild(cur);
    document.body.addEventListener('click', initAudio, {once:true});
    // Restore UI on Double Tap
    document.body.addEventListener('dblclick', () => {
      document.body.classList.remove('recording');
      document.getElementById('recBtn').classList.remove('active');
    });
    setTimeout(startTyping, 1200);
  }
});

function startTyping(){ running=true; setState('running'); tick(); }

function tick(){
  if(!running || paused) return;
  if(idx>=code.length){ running=false; setState('done'); confettiBurst(); return; }
  
  const ch=code[idx]; idx++;
  out.innerHTML = highlight(code.slice(0, idx));
  out.appendChild(cur);
  playClick();

  if(localStorage.getItem('cp_shake')==='true' && ch !== ' ' && ch !== '\n') {
    document.body.classList.add('shake');
    setTimeout(() => document.body.classList.remove('shake'), 40);
  }
  
  cur.scrollIntoView({block:'nearest',behavior:'smooth'});
  if(ch==='>' || idx%100===0) renderPreview(code.slice(0,idx));
  updateSb();
  
  // Speed Logic Fix: Always fetch current setting from localStorage
  const spdSetting = parseInt(localStorage.getItem(LSP)||'5');
  const spdIdx = Math.min(Math.max(spdSetting, 1), 20) - 1;
  let delay = delays[spdIdx];
  if(localStorage.getItem('cp_turbo')==='true') delay = Math.max(0, delay/2);
  
  timer = setTimeout(tick, delay);
}

function updateFS(v){ 
  document.querySelector('.code-area').style.fontSize = v+'px'; 
  document.getElementById('fsNum').textContent = v+'px'; 
}

function toggle(){
  if(paused){ paused=false; running=true; setState('running'); tick(); }
  else { paused=true; setState('paused'); }
}
function toggleRec(){ document.body.classList.toggle('recording'); document.getElementById('recBtn').classList.toggle('active'); }
function renderPreview(html){ document.getElementById('prvFrame').srcdoc = html; }
function togglePreview(){ 
  const p = document.getElementById('prvWrap');
  p.style.height = (p.style.height==='0px'||!p.style.height) ? '25vh' : '0';
}
function focusSwitch() {
  const isPrv = document.body.classList.toggle('show-prv');
  document.getElementById('swTxt').textContent = isPrv ? 'Show Code' : 'Show Preview';
}
function setState(s){
  document.getElementById('ctrlLbl').textContent = s==='paused'?'Resume':'Stop';
  document.getElementById('ctrlIco').className = s==='paused'?'fa-solid fa-play':'fa-solid fa-pause';
}
function updateSb(){ document.getElementById('sbPct').textContent = Math.round((idx/code.length)*100)+'%'; }
function confettiBurst(){
  for(let i=0; i<30; i++){
    const conf = document.createElement('div');
    conf.style.cssText = `position:fixed; left:50%; top:50%; width:8px; height:8px; background:hsl(${Math.random()*360},100%,50%); border-radius:50%; z-index:10000; pointer-events:none;`;
    document.body.appendChild(conf);
    const angle = Math.random()*Math.PI*2, vel = 5+Math.random()*10, vx = Math.cos(angle)*vel, vy = Math.sin(angle)*vel;
    let x=0, y=0, op=1;
    const move = () => { x+=vx; y+=vy; op-=0.02; conf.style.transform=`translate(${x}px,${y}px)`; conf.style.opacity=op; if(op>0) requestAnimationFrame(move); else conf.remove(); };
    move();
  }
}
</script>
</body>
</html>
