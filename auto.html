<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#020204;
  --accent:#00d2ff;
  --accent-alt:#3a7bd5;
  --card-bg:rgba(15,15,20,0.6);
  --border:rgba(0,210,255,0.3);
  --text:#ffffff;
  --glass:blur(40px) saturate(200%);
  --neon-glow:0 0 20px rgba(0,210,255,0.4), 0 0 40px rgba(0,210,255,0.2);
}
body{
  background:radial-gradient(circle at center, #0a0a1a 0%, #020204 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  overflow:hidden;
}

/* ── CINEMATIC CARD ── */
.code-card{
  width:92%; max-width:800px; height:80vh;
  background:var(--card-bg); border:1px solid var(--border);
  border-radius:24px; position:relative; overflow:hidden;
  backdrop-filter:var(--glass); -webkit-backdrop-filter:var(--glass);
  box-shadow:0 30px 100px rgba(0,0,0,0.8), var(--neon-glow);
  display:flex; flex-direction:column;
  animation:card-float 6s ease-in-out infinite;
}
@keyframes card-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

.card-header{
  height:50px; padding:0 20px; background:rgba(0,0,0,0.3);
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.card-dots{display:flex; gap:8px;}
.cdot{width:10px; height:10px; border-radius:50%;}

.code-area{
  flex:1; padding:30px; overflow-y:auto; scrollbar-width:none;
  font-family:'JetBrains Mono', monospace; font-size:16px; line-height:1.7;
}
.code-area::-webkit-scrollbar{display:none;}

/* ── RECORDING MODE ── */
body.recording .ui-hide{opacity:0; pointer-events:none;}
.rec-btn{
  position:fixed; bottom:30px; right:30px;
  width:60px; height:60px; border-radius:50%;
  background:rgba(255,59,48,0.2); border:2px solid #ff3b30;
  display:flex; align-items:center; justify-content:center;
  color:#ff3b30; cursor:pointer; z-index:1000;
  transition:0.3s;
}
.rec-btn.active{background:#ff3b30; color:#fff; box-shadow:0 0 30px #ff3b30;}

/* ── SYNTAX COLORS ── */
.tag{color:#ff79c6; text-shadow:0 0 10px rgba(255,121,198,0.3)}
.attr{color:#50fa7b}
.val{color:#f1fa8c}
.com{color:#6272a4; font-style:italic}
...
<body>
<div class="grid-bg"></div>

<div class="code-card">
  <div class="card-header">
    <div class="card-dots">
      <div class="cdot" style="background:#ff5f57"></div>
      <div class="cdot" style="background:#febc2e"></div>
      <div class="cdot" style="background:#28c840"></div>
    </div>
    <span style="font-size:11px;font-weight:800;color:var(--accent);letter-spacing:2px;text-transform:uppercase" id="fname">INDEX.HTML</span>
    <div style="width:40px"></div>
  </div>
  
  <div class="code-area" id="cs">
    <pre id="out"></pre>
  </div>

  <div class="preview-wrap shut" id="prvWrap" style="height:0">
     <iframe id="prvFrame" style="width:100%;height:100%;border:none"></iframe>
  </div>
</div>

<!-- FLOATING UI -->
<div class="ui-hide" style="position:fixed;top:20px;left:20px;display:flex;gap:10px;z-index:500">
  <button class="ctrl" onclick="toggle()"><i class="fa-solid fa-pause" id="ctrlIco"></i><span id="ctrlLbl">Stop</span></button>
  <button class="ctrl" onclick="togglePreview()"><i class="fa-solid fa-display"></i> Preview</button>
</div>

<div class="rec-btn" onclick="toggleRec()" id="recBtn"><i class="fa-solid fa-video"></i></div>

<div class="statusbar ui-hide">
  <span id="sbSt">Typing...</span><div class="sb-sp"></div><span id="sbPct">0%</span>
</div>

<script>
const LS='codepad_v1', LSP='codepad_speed';
let code='',idx=0,running=false,paused=false,timer=null;
const out=document.getElementById('out'), cs=document.getElementById('cs');
const cur=document.createElement('span'); cur.className='cur';
const delays=[120,80,50,30,20,12,8,4,2,1];

// Audio
let audioCtx = null, clickBuffer = null;
async function initAudio() {
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') await audioCtx.resume();
  if(!clickBuffer && getOpt('sound')) {
    try {
      const resp = await fetch('keyboard affect.wav');
      clickBuffer = await audioCtx.decodeAudioData(await resp.arrayBuffer());
    } catch(e) { console.error(e); }
  }
}
function playClick() {
  if(!getOpt('sound') || !clickBuffer || !audioCtx) return;
  const source = audioCtx.createBufferSource(); source.buffer = clickBuffer;
  const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  source.connect(gain); gain.connect(audioCtx.destination); source.start(0);
}

// Logic
const getOpt = (o) => localStorage.getItem('cp_'+o) === 'true';
function delay(){
  let d = delays[Math.min(Math.max(parseInt(localStorage.getItem(LSP)||'5'),1),10)-1];
  return getOpt('turbo') ? Math.max(1, d / 2) : d;
}

function highlight(text) {
  const escaped = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const rules = [
    { reg: /(&lt;!--.*?--&gt;)/g, cls: 'com' },
    { reg: /(&lt;[!\/]?[a-zA-Z0-9]+(?:\s+[a-zA-Z0-9-]+(?:=".*?")?)*[!\/]?&gt;)/g, cls: 'tag' },
    { reg: /(".*?")/g, cls: 'val' }
  ];
  let result = escaped; const placeholders = [];
  rules.forEach((rule, i) => {
    result = result.replace(rule.reg, (m) => {
      const ph = `__PH_${i}_${placeholders.length}__`;
      placeholders.push({ ph, html: `<span class="${rule.cls}">${m}</span>` });
      return ph;
    });
  });
  placeholders.forEach(p => result = result.replace(p.ph, p.html));
  return result;
}

window.addEventListener('DOMContentLoaded',()=>{
  code=localStorage.getItem(LS)||'';
  if(code){
    out.innerHTML = ''; out.appendChild(cur);
    document.body.addEventListener('click', initAudio, {once:true});
    setTimeout(startTyping, 1000);
  }
});

function startTyping(){ running=true; tick(); }

function tick(){
  if(!running || paused) return;
  if(idx>=code.length){ running=false; setState('done'); confettiBurst(); return; }
  
  const ch=code[idx]; idx++;
  const partial = code.slice(0, idx);
  out.innerHTML = highlight(partial);
  out.appendChild(cur);
  playClick();

  if(getOpt('shake') && ch !== ' ' && ch !== '\n') {
    document.body.classList.add('shake');
    setTimeout(() => document.body.classList.remove('shake'), 40);
  }
  
  cur.scrollIntoView({block:'nearest',behavior:'smooth'});
  
  if(ch==='>' || idx%100===0) renderPreview(partial);
  updateSb();
  timer = setTimeout(tick, delay());
}

function toggle(){
  if(paused){ paused=false; running=true; setState('running'); tick(); }
  else { paused=true; setState('paused'); }
}

function toggleRec(){
  document.body.classList.toggle('recording');
  document.getElementById('recBtn').classList.toggle('active');
}

function renderPreview(html){ document.getElementById('prvFrame').srcdoc = html; }
function togglePreview(){ 
  const p = document.getElementById('prvWrap');
  if(p.style.height==='0px'||!p.style.height){ p.style.height='25vh'; p.className='preview-wrap open'; }
  else { p.style.height='0'; p.className='preview-wrap shut'; }
}

function setState(s){
  document.getElementById('ctrlLbl').textContent = s==='paused'?'Resume':'Stop';
  document.getElementById('sbSt').textContent = s.toUpperCase();
}

function updateSb(){
  document.getElementById('sbPct').textContent = Math.round((idx/code.length)*100)+'%';
}

function confettiBurst(){
  for(let i=0; i<30; i++){
    const conf = document.createElement('div');
    conf.style.cssText = `position:fixed; left:50%; top:50%; width:8px; height:8px; background:hsl(${Math.random()*360},100%,50%); border-radius:50%; z-index:10000; pointer-events:none;`;
    document.body.appendChild(conf);
    const angle = Math.random()*Math.PI*2, vel = 5+Math.random()*10, vx = Math.cos(angle)*vel, vy = Math.sin(angle)*vel;
    let x=0, y=0, op=1;
    const move = () => { x+=vx; y+=vy; op-=0.02; conf.style.transform=`translate(${x}px,${y}px)`; conf.style.opacity=op; if(op>0) requestAnimationFrame(move); else conf.remove(); };
    move();
  }
}
</script>
</body>
</html>
